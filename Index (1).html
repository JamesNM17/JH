<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Minha Biblioteca de Poesias</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=EB+Garamond&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body class="dark">

<header>

<h1>Biblioteca de Poesias</h1>

<p>Colecione sentimentos em palavras.</p>

<div class="topo">

<input
type="text"
placeholder="Pesquisar por título ou palavra..."
id="pesquisa">

<button id="tema">🌙</button>

<button id="favoritos">❤️ Favoritas</button>

</div>

<select id="categorias">

<option>Todas</option>

<option>Romântica</option>

<option>Melancólica</option>

<option>Reflexiva</option>

<option>Esperança</option>

<option>Intensa</option>

</select>

</header>

<section id="capaCategoria">

<h2>📚 Todas as Poesias</h2>

<p>Escolha uma categoria para começar.</p>

</section>

<main id="biblioteca">

<!-- Os cards serão criados pelo JavaScript -->

</main>

<footer>

Feito para guardar sentimentos.

</footer>

<script src="script.js"></script>

</body>

</html>
