<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Biblioteca de Poesias</title>

    <!-- Fontes -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=EB+Garamond&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="style.css">

</head>

<body class="dark">

<header>

    <h1>📚 Biblioteca de Poesias</h1>

    <p>
        Um lugar para guardar sentimentos em versos.
    </p>

    <div class="topo">

        <input
        type="text"
        id="pesquisa"
        placeholder="Pesquisar por título, palavra ou dedicatória...">

        <button id="tema">
            🌙
        </button>

        <button id="favoritos">
            ❤️ Favoritas
        </button>

    </div>

    <select id="categorias">

        <option value="Todas">Todas</option>

        <option value="Romântica">❤️ Romântica</option>

        <option value="Melancólica">🌧️ Melancólica</option>

        <option value="Reflexiva">🍂 Reflexiva</option>

        <option value="Esperança">🌅 Esperança</option>

        <option value="Intensa">🔥 Intensa</option>

    </select>

</header>

<section id="capaCategoria">

    <h2>
        📚 Todas as Poesias
    </h2>

    <p>
        Escolha uma categoria para começar sua leitura.
    </p>

</section>

<main id="biblioteca">

    <!-- Os cards serão criados automaticamente pelo JavaScript -->

</main>

<footer>

    <p>

        © 2026 • Biblioteca de Poesias

    </p>

    <p>

        Desenvolvido por Jheymes Nascimento

    </p>

</footer>

<!-- MODAL DE LEITURA -->

<div id="leitor">

    <button id="fecharLivro">

        ✕

    </button>

    <div id="livro">

        <!-- O JavaScript poderá preencher este conteúdo futuramente -->

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
